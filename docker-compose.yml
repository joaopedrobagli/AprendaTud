version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: aprendatud_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aprendatud
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aprendatud_redis
    ports:
        - '6380:6379'

volumes:
  postgres_data: